<!doctype html>
<html lang="fa" dir="rtl" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پشتیبانی</title>
    <link rel="stylesheet" href="/css/bootstrap.rtl.css" />
    <link
      rel="stylesheet"
      href="/css/bootstrap-icons-1.13.1/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/support.css" />
    <link rel="stylesheet" href="/aos-master/dist/aos.css" />
  </head>
  <body>
    <header>
      <nav class="navbar fixed-top mt-1">
        <div class="container-fluid">
          <a class="navbar-brand bold" href="#">اسموت <b class="theme-color2">کد</b></a>
          <button
            class="navbar-toggler navbar-toggler-mobile"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasNavbar"
            aria-controls="offcanvasNavbar"
          >
            <svg
              width="26px"
              height="26px"
              viewBox="0 0 20 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M17.2027 4.90034V6.43655H2.79724V4.90034H17.2027Z"
                fill="currentColor"
              />

              <path
                d="M17.2027 9.90034V11.4366H2.79724V9.90034H17.2027Z"
                fill="currentColor"
              />

              <path
                d="M10.9603 14.9003V16.4366H2.79724V14.9003H10.9603Z"
                fill="currentColor"
              />
            </svg>
          </button>
          <div
            class="offcanvas offcanvas-start"
            tabindex="-1"
            id="offcanvasNavbar"
            aria-labelledby="offcanvasNavbarLabel"
          >
            <div class="offcanvas-header">
              <h5 class="offcanvas-title" id="offcanvasNavbarLabel">
                Offcanvas
              </h5>
              <button
                type="button"
                class="btn-close text-reset"
                data-bs-dismiss="offcanvas"
                aria-label="Close"
              ></button>
            </div>
            <div class="offcanvas-body">
              <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="#"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Link</a>
                </li>
                <li class="nav-item dropdown">
                  <a
                    class="nav-link dropdown-toggle"
                    href="#"
                    id="dropdownId"
                    data-bs-toggle="dropdown"
                    aria-haspopup="true"
                    aria-expanded="false"
                    >Dropdown</a
                  >
                  <div class="dropdown-menu" aria-labelledby="dropdownId">
                    <a class="dropdown-item" href="#">Action 1</a>
                    <a class="dropdown-item" href="#">Action 2</a>
                  </div>
                </li>
              </ul>
              <form class="d-flex">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Search"
                  aria-label="Search"
                />
                <button class="btn btn-outline-success" type="submit">
                  Search
                </button>
              </form>
            </div>
          </div>
        </div>
      </nav>
    </header>
     <section class="support-control "> <!-- .center-control -->
      <div class="support-box w-100">
        <!-- <div>
          <h1 class="bold d-flex align-items-center">
            <span class="support-icon"
              ><i class="bi bi-shield theme-color2"></i
            ></span>
            <span class="support-contain">چطور کمکتان کنیم ؟</span>
          </h1>
        </div> -->
        <div>
          <div class="chatbox show-chat">
            <p>لورم ایسپوم متن ساختگس</p>
            <div class="icon-user-chat">
              <span>
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  data-v-d8d491d1=""
                >
                  <path
                    d="M5.83594 18.847C9.02908 15.5032 14.932 15.3458 18.1594 18.847M15.414 8.57748C15.414 10.4671 13.8804 12.0007 11.9867 12.0007C11.5367 12.0014 11.091 11.9134 10.675 11.7417C10.2591 11.5699 9.88106 11.3179 9.56261 11C9.24416 10.682 8.99152 10.3044 8.81914 9.88874C8.64677 9.47306 8.55805 9.02748 8.55805 8.57748C8.55805 6.68788 10.0916 5.1543 11.9867 5.1543C12.4366 5.15376 12.8822 5.2419 13.298 5.41369C13.7137 5.58548 14.0916 5.83755 14.4099 6.15547C14.7282 6.4734 14.9807 6.85095 15.153 7.26653C15.3253 7.68212 15.414 8.12759 15.414 8.57748Z"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </svg>
              </span>
            </div>
          </div>
        </div>
        <div>
          <div class="chatbox show-chat left border border-1">
            <p>لورم ایسپوم متن ساختگس</p>
            <div class="icon-user-chat">
              <span>
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  data-v-d8d491d1=""
                >
                  <path
                    d="M5.83594 18.847C9.02908 15.5032 14.932 15.3458 18.1594 18.847M15.414 8.57748C15.414 10.4671 13.8804 12.0007 11.9867 12.0007C11.5367 12.0014 11.091 11.9134 10.675 11.7417C10.2591 11.5699 9.88106 11.3179 9.56261 11C9.24416 10.682 8.99152 10.3044 8.81914 9.88874C8.64677 9.47306 8.55805 9.02748 8.55805 8.57748C8.55805 6.68788 10.0916 5.1543 11.9867 5.1543C12.4366 5.15376 12.8822 5.2419 13.298 5.41369C13.7137 5.58548 14.0916 5.83755 14.4099 6.15547C14.7282 6.4734 14.9807 6.85095 15.153 7.26653C15.3253 7.68212 15.414 8.12759 15.414 8.57748Z"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </svg>
              </span>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div class="fixed-bottom w-100" style="z-index: 1">
      <div class="input-support d-flex">
        <button class="btn" id="file-btn">
          <i class="bi bi-plus-lg"></i>
        </button>
        <div class="w-100">
          <input
            type="text"
            class="form-control"
            name=""
            id="form-val"
            aria-describedby="emailHelpId"
            placeholder="اینجا بنویسید"
          />
        </div>
        <input type="file" class="d-none" id="file-inp" />
        <button class="btn send-btn disabled" id="form-send">
          <span>
            <svg
              width="14"
              height="14"
              viewBox="0 0 16 16"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M8.3125 0.981587C8.66767 1.0545 8.97902 1.20558 9.2627 1.43374C9.48724 1.61438 9.73029 1.85933 9.97949 2.10854L14.707 6.83608L13.293 8.25014L9 3.95717V15.0431H7V3.95717L2.70703 8.25014L1.29297 6.83608L6.02051 2.10854C6.26971 1.85933 6.51277 1.61438 6.7373 1.43374C6.97662 1.24126 7.28445 1.04542 7.6875 0.981587C7.8973 0.94841 8.1031 0.956564 8.3125 0.981587Z"
                fill="currentColor"
              ></path>
            </svg>
          </span>
        </button>
      </div>
    </div>
    <script>
      document.getElementById("file-btn").addEventListener("click", () => {
        document.getElementById("file-inp").click();
      });
    </script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="/js/script.js"></script>
    <script src="/aos-master/dist/aos.js"></script>
    <script>
      document.getElementById('form-val').addEventListener('input',()=>{
        if (document.getElementById('form-val').value != '') {
        document.getElementById('form-send').classList.remove('disabled');
        }
        else {
        document.getElementById('form-send').classList.add('disabled');
        }
      });
      
    </script>
  </body>
</html>

<!doctype html>
<html lang="fa" dir="rtl" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اسموت پلیر</title>
    <link rel="stylesheet" href="css/bootstrap.rtl.css" />
    <link
      rel="stylesheet"
      href="/css/bootstrap-icons-1.13.1/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="alert-custom border border-1">
      <div class="alert-icon">
        <i class="bi bi-info text-white rounded-1"></i>
      </div>
      <div class="alert-content"></div>
    </div>
    <div class="login">
      <div class="d-flex align-items-stretch justify-content-center w-100">
        <div class="col-11 col-lg-3 px-2 login-box">
          <h4 class="text-center">
            <b class="theme-color2">اسموت</b> <b class="theme-color">کد</b>
          </h4>
          <div class="mb-3">
            <label for="" class="form-label">شماره :</label>
            <input
              type="text"
              class="form-control form-control-lg smoth-input phone"
              name=""
              id=""
              required
              placeholder="شماره خود را وارد کنید"
            />
          </div>
          <div class="mb-3">
            <label for="" class="form-label">رمزعبور :</label>
            <input
              type="password"
              class="form-control form-control-lg smoth-input"
              name=""
              id=""
              required
              placeholder="شماره خود را وارد کنید"
            />
          </div>
          <br />
          <button class="w-100 btn btn-lg btn-primary">ورود</button>
          <div class="help-text text-muted text-center small">
            پس از ورود یعنی <a href="">قوانین</a> را پذیرفته اید
          </div>
          <div class="or"><span class="or-content">یا</span></div>
          <a
            href="/login-with-code.html"
            class="w-100 btn btn-lg theme-color2 border border-primary border-2"
            >ورودبا کدتایید</a
          >
        </div>
      </div>
    </div>
    <!-- Scripts -->
    <script src="/js/bootstrap.min.js"></script>
    <script src="/js/script.js"></script>
    <script>
      show_message("خطا");
    </script>
  </body>
</html>
